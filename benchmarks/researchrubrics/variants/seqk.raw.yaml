# researchrubrics + seq@k with raw feedback (verifier's rubric diagnostic verbatim).
# This is the mode the paper reports for ResearchRubrics.
metric: seq@k
k: 5
feedback_mode: raw              # binary | raw | critic
model: openai/gpt-4o-mini
judge_model: openai/gpt-4o-mini
temperature: 0.7
max_tasks: 2
console_char_limit: 3000
