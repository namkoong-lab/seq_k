# advancedif smoke: one task, seq@2, raw feedback, Sonnet, S3-on.
metric: seq@k
k: 2
feedback_mode: raw              # per-question verdicts verbatim
model: anthropic/claude-sonnet-4-6
judge_model: anthropic/claude-sonnet-4-6
temperature: 0.7
max_tasks: 1
out: runs/advancedif.smoke.seqk
console_char_limit: 3000
s3_sync: true
options:
  data_path: ~/datasets/AdvancedIF/data.jsonl
