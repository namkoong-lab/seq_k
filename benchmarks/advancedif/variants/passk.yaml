# advancedif + pass@k baseline (independent, feedback-blind attempts).
# Requires a prepared AdvancedIF JSONL: set options.data_path to it.
metric: pass@k
k: 5
feedback_mode: binary           # ignored under pass@k
model: openai/gpt-4o-mini
judge_model: openai/gpt-4o-mini
temperature: 0.7
max_tasks: 2
console_char_limit: 3000
options:
  data_path: "data/advancedif/advancedIF.jsonl"   # <-- edit to your prepared JSONL
