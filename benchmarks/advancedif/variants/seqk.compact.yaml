# advancedif + seq@k with compact feedback (only the unmet requirements, briefly).
# Requires a prepared AdvancedIF JSONL: set options.data_path to it.
metric: seq@k
k: 5
feedback_mode: compact          # binary | raw | compact
model: openai/gpt-4o-mini
judge_model: openai/gpt-4o-mini
temperature: 0.7
max_tasks: 2
out: runs/advancedif.seqk.compact
console_char_limit: 3000
options:
  data_path: "data/advancedif/advancedIF.jsonl"   # <-- edit to your prepared JSONL
