# healthbench + seq@k with raw feedback (verifier diagnostic: unmet/triggered criteria).
metric: seq@k
k: 5
feedback_mode: raw              # binary | raw | judge
model: anthropic/claude-sonnet-4-6
judge_model: anthropic/claude-sonnet-4-6
temperature: 0.7
max_tasks: 12
out: runs/healthbench.seqk.raw
console_char_limit: 3000
