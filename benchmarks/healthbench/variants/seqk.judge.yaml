# healthbench + seq@k with rubric-grounded judge feedback (the paper's default mode).
metric: seq@k
k: 5
feedback_mode: judge            # binary | raw | judge
model: openai/gpt-4o-mini
judge_model: openai/gpt-4o-mini
temperature: 0.7
max_tasks: 2
out: runs/healthbench.seqk.judge
console_char_limit: 3000
