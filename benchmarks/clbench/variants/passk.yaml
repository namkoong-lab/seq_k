# clbench + pass@k: k independent, feedback-blind attempts; pass if any passes.
# benchmark is inferred from this file's path (benchmarks/clbench/).
metric: pass@k
k: 5
feedback_mode: binary           # ignored under pass@k (no feedback is shown)
model: openai/gpt-4o-mini
judge_model: openai/gpt-4o-mini
temperature: 0.7
max_tasks: 2
out: runs/clbench.passk
console_char_limit: 3000
