# clbench + seq@k with binary feedback: each retry is only told "you didn't pass".
metric: seq@k
k: 5
feedback_mode: binary           # binary | raw | socratic | directive
model: openai/gpt-4o-mini
judge_model: openai/gpt-4o-mini
temperature: 0.7
max_tasks: 2
out: runs/clbench.seqk.binary
console_char_limit: 3000
