# clbench + seq@k with socratic LLM feedback: a rubric-aware critic asks guiding questions.
metric: seq@k
k: 5
feedback_mode: socratic         # binary | raw | socratic | directive
model: openai/gpt-4o-mini
judge_model: openai/gpt-4o-mini
temperature: 0.7
max_tasks: 2
out: runs/clbench.seqk.socratic
console_char_limit: 3000
